<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当前时间</title>
  <style>
    :root {
      --bg-top: #f4efe6;
      --bg-bottom: #d7e7f1;
      --panel: rgba(255, 252, 247, 0.78);
      --text-main: #1f2a33;
      --text-muted: #5f6b73;
      --accent: #c96f3b;
      --accent-soft: rgba(201, 111, 59, 0.14);
      --shadow: rgba(31, 42, 51, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 34%),
        radial-gradient(circle at bottom right, rgba(201, 111, 59, 0.22), transparent 28%),
        linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      font-family: Georgia, "Times New Roman", serif;
    }

    .clock-card {
      width: min(100%, 720px);
      padding: 40px 32px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px var(--shadow);
      text-align: center;
    }

    .label {
      margin: 0 0 12px;
      letter-spacing: 0.18em;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .time {
      margin: 0;
      font-size: clamp(3.2rem, 10vw, 6.8rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .date {
      margin: 18px 0 0;
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: var(--text-muted);
    }

    .timezone {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    @media (max-width: 520px) {
      .clock-card {
        padding: 28px 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="clock-card">
    <p class="label">Current Time</p>
    <h1 class="time" id="time">--:--:--</h1>
    <p class="date" id="date">正在加载日期...</p>
    <div class="timezone" id="timezone">时区加载中</div>
  </main>

  <script>
    const timeElement = document.getElementById("time");
    const dateElement = document.getElementById("date");
    const timezoneElement = document.getElementById("timezone");

    function updateClock() {
      const now = new Date();

      const timeText = new Intl.DateTimeFormat("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const dateText = new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(now);

      const timezoneText = Intl.DateTimeFormat().resolvedOptions().timeZone;

      timeElement.textContent = timeText;
      dateElement.textContent = dateText;
      timezoneElement.textContent = timezoneText;
      ccc
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>

</html>
